<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABCパズル — スライドパズル（メタル版）</title>
<style>
  :root {
    --bg: #23282e;          /* グラファイトの台 */
    --bg-deep: #16191d;
    --frame: #3a4048;       /* 金属枠（ダークスチール） */
    --frame-hi: #565e68;
    --tile-hi: #f4f6f8;     /* プレート表面（明・ステンレス） */
    --tile-lo: #b7bec6;     /* プレート表面（暗） */
    --tile-edge: #878f99;
    --ink: #2b3038;         /* 文字色（濃鋼色・刻印風） */
    --paper: #e8ecf1;       /* 文字色（明） */
    --accent: #3b7dd8;      /* スチールブルー（ボタン） */
    --accent-dark: #2a5ea8;
    --tile-size: min(24vw, 108px);
    --gap: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    padding: 24px 16px;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(255,255,255,.06), transparent 60%),
      var(--bg);
    color: var(--paper);
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Kaku Gothic ProN",
                 "Yu Gothic Medium", "Yu Gothic", "Meiryo", sans-serif;
    -webkit-user-select: none;
    user-select: none;
  }

  header { text-align: center; }
  h1 {
    font-size: 1.7rem;
    letter-spacing: .35em;
    text-indent: .35em;
    font-weight: 700;
  }
  .subtitle {
    margin-top: 6px;
    font-size: .8rem;
    letter-spacing: .18em;
    opacity: .65;
  }

  /* ---- 盤面 ---- */
  .frame {
    padding: 14px;
    border-radius: 14px;
    background:
      repeating-linear-gradient(94deg,
        rgba(255,255,255,.04) 0 3px, transparent 3px 9px),
      linear-gradient(160deg, var(--frame-hi), var(--frame));
    box-shadow:
      inset 0 2px 2px rgba(255,255,255,.18),
      inset 0 -3px 4px rgba(0,0,0,.35),
      0 10px 26px rgba(0,0,0,.45);
  }
  .board {
    position: relative;
    width: calc(var(--tile-size) * 3 + var(--gap) * 2);
    height: calc(var(--tile-size) * 3 + var(--gap) * 2);
    border-radius: 8px;
    background: var(--bg-deep);
    box-shadow: inset 0 3px 8px rgba(0,0,0,.6);
    touch-action: manipulation;
  }

  .tile {
    position: absolute;
    top: 0; left: 0;
    width: var(--tile-size);
    height: var(--tile-size);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: calc(var(--tile-size) * .46);
    font-weight: 700;
    color: var(--ink);
    border-radius: 10px;
    background:
      repeating-linear-gradient(92deg,
        rgba(255,255,255,.28) 0 1px, transparent 1px 4px),
      linear-gradient(155deg,
        var(--tile-hi) 0%, #dfe4e9 35%, var(--tile-lo) 60%, #d5dade 82%, #9aa1aa 100%);
    border: 1px solid var(--tile-edge);
    text-shadow: 0 1px 0 rgba(255,255,255,.65);   /* 刻印風の凹み表現 */
    box-shadow:
      inset 0 2px 2px rgba(255,255,255,.85),
      inset 0 -3px 4px rgba(40,50,60,.4),
      0 3px 5px rgba(0,0,0,.5);
    cursor: pointer;
    transition: transform .16s ease-out;
    will-change: transform;
  }
  .tile:active { filter: brightness(.96); }

  @media (prefers-reduced-motion: reduce) {
    .tile { transition: none; }
  }

  /* ---- 操作パネル ---- */
  .panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    width: min(92vw, 400px);
  }
  .row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font: inherit;
    font-weight: 700;
    letter-spacing: .08em;
    padding: 10px 18px;
    border-radius: 999px;
    border: none;
    color: var(--paper);
    background: linear-gradient(180deg, var(--accent), var(--accent-dark));
    box-shadow: 0 3px 0 #6d2216, 0 5px 10px rgba(0,0,0,.35);
    cursor: pointer;
    transition: transform .06s, box-shadow .06s, opacity .2s;
  }
  button:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #6d2216, 0 3px 6px rgba(0,0,0,.3);
  }
  button:disabled { opacity: .45; cursor: default; }
  button.ghost {
    background: linear-gradient(180deg, #3d5570, #2c3f54);
    box-shadow: 0 3px 0 #16222f, 0 5px 10px rgba(0,0,0,.3);
  }
  button.ghost:active {
    box-shadow: 0 1px 0 #16222f, 0 3px 6px rgba(0,0,0,.25);
  }
  button:focus-visible {
    outline: 3px solid #8fc0f5;
    outline-offset: 2px;
  }

  .status {
    display: flex;
    gap: 24px;
    font-size: .95rem;
    letter-spacing: .1em;
  }
  .status b { font-size: 1.2rem; color: #9fc6ef; }

  .speed {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: .78rem;
    letter-spacing: .1em;
    opacity: .9;
  }
  .speed input[type="range"] {
    width: 170px;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .switch {
    font-size: .8rem;
    letter-spacing: .12em;
  }
  .switch a { color: inherit; opacity: .65; }
  .switch a:hover { opacity: 1; }

  .message {
    min-height: 1.6em;
    font-size: 1.05rem;
    letter-spacing: .2em;
    color: #9fc6ef;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <h1>ABCパズル</h1>
  <div class="subtitle">プレートをスライドして A〜H を並べよう</div>
</header>

<div class="frame">
  <div class="board" id="board" aria-label="パズル盤面"></div>
</div>

<div class="panel">
  <div class="status">
    <span>手数 <b id="moveCount">0</b></span>
  </div>
  <div class="row">
    <button id="btnShuffle">シャッフル</button>
    <button id="btnUndo" class="ghost">1手戻す</button>
    <button id="btnSolve" class="ghost">自動で解く</button>
    <button id="btnInstant" class="ghost">一瞬で完成</button>
    <button id="btnStop" class="ghost" hidden>停止</button>
  </div>
  <div class="speed">
    <span>ゆっくり</span>
    <input type="range" id="speed" min="0" max="100" value="55"
           aria-label="自動解答の速度">
    <span>はやい</span>
  </div>
  <div class="message" id="message"></div>
  <div class="switch"><a href="index.html">数字版（木製調）はこちら →</a></div>
</div>

<script>
"use strict";

/* =====================================================
   盤面の状態
   board[i] = マス i にあるプレート番号（0 は空きマス）
   プレート番号と表示の対応: 1=A, 2=B, … 8=H
   マス番号:  0 1 2
              3 4 5
              6 7 8
   完成形: [1,2,3,4,5,6,7,8,0] = A B C / D E F / G H □
===================================================== */
const GOAL = [1, 2, 3, 4, 5, 6, 7, 8, 0];
let board = GOAL.slice();
let moveCount = 0;
let shuffled = false;   // シャッフル済みか（完成判定に使用）

const boardEl   = document.getElementById("board");
const moveEl    = document.getElementById("moveCount");
const messageEl = document.getElementById("message");
const btnShuffle = document.getElementById("btnShuffle");
const btnUndo    = document.getElementById("btnUndo");

/* ---- プレート要素の生成 ----
   内部の盤面管理は数字（1〜8）のまま、表示だけ A〜H に対応させる。
   1→A, 2→B, … 8→H                                        */
const LABELS = ["", "A", "B", "C", "D", "E", "F", "G", "H"];
const tileEls = {};   // プレート番号 → DOM要素
for (let n = 1; n <= 8; n++) {
  const el = document.createElement("div");
  el.className = "tile";
  el.textContent = LABELS[n];
  el.dataset.num = n;
  el.addEventListener("click", () => onTileClick(n));
  boardEl.appendChild(el);
  tileEls[n] = el;
}

/* ---- 座標計算 ---- */
function cellXY(index) {
  const col = index % 3;
  const row = Math.floor(index / 3);
  return { col, row };
}

function render() {
  for (let i = 0; i < 9; i++) {
    const n = board[i];
    if (n === 0) continue;
    const { col, row } = cellXY(i);
    tileEls[n].style.transform =
      `translate(calc(${col} * (var(--tile-size) + var(--gap))),` +
      ` calc(${row} * (var(--tile-size) + var(--gap))))`;
  }
  moveEl.textContent = moveCount;
  btnUndo.disabled = solving || history.length === 0;
}

/* ---- 移動処理 ---- */
function neighbors(index) {
  const { col, row } = cellXY(index);
  const list = [];
  if (row > 0) list.push(index - 3);
  if (row < 2) list.push(index + 3);
  if (col > 0) list.push(index - 1);
  if (col < 2) list.push(index + 1);
  return list;
}

function tryMove(tileNum) {
  const from  = board.indexOf(tileNum);
  const empty = board.indexOf(0);
  if (!neighbors(empty).includes(from)) return false;
  board[empty] = tileNum;
  board[from]  = 0;
  return true;
}

let history = [];   // 手動で動かしたプレート番号の履歴（アンドゥ用）

function onTileClick(n) {
  if (solving) return;          // 自動解答中は手動操作を受け付けない
  if (!tryMove(n)) return;
  history.push(n);
  moveCount++;
  render();
  checkSolved();
}

/* アンドゥ: 直前に動かしたプレートをもう一度動かすと元の位置に戻る */
function undo() {
  if (solving || history.length === 0) return;
  const n = history.pop();
  tryMove(n);
  moveCount = Math.max(0, moveCount - 1);
  messageEl.textContent = "";
  render();
}

function isSolved() {
  return board.every((v, i) => v === GOAL[i]);
}

function checkSolved() {
  if (shuffled && isSolved()) {
    messageEl.textContent = `完成！ ${moveCount} 手でそろいました`;
    shuffled = false;
  }
}

/* ---- シャッフル ----
   完成形からランダムな正規手を多数適用する方式。
   これにより「必ず解ける配置」だけが生成される。
   直前の手をすぐ打ち消す動きは避ける。            */
function shuffle(times = 200) {
  board = GOAL.slice();
  let prevEmpty = -1;
  for (let k = 0; k < times; k++) {
    const empty = board.indexOf(0);
    const cands = neighbors(empty).filter(i => i !== prevEmpty);
    const pick  = cands[Math.floor(Math.random() * cands.length)];
    board[empty] = board[pick];
    board[pick]  = 0;
    prevEmpty = empty;
  }
  moveCount = 0;
  history = [];
  shuffled = true;
  messageEl.textContent = "";
  render();
}

btnShuffle.addEventListener("click", () => {
  stopAutoPlay();
  shuffle();
});

/* =====================================================
   A* 探索ソルバー
   ヒューリスティック: マンハッタン距離
   戻り値: 動かすプレート番号の配列（最短手順）
===================================================== */
function manhattan(b) {
  let d = 0;
  for (let i = 0; i < 9; i++) {
    const v = b[i];
    if (v === 0) continue;
    const gi = v - 1; // 完成形での位置
    d += Math.abs(i % 3 - gi % 3) + Math.abs(Math.floor(i / 3) - Math.floor(gi / 3));
  }
  return d;
}

/* 最小ヒープ（優先度付きキュー） */
class MinHeap {
  constructor() { this.a = []; }
  push(item) {
    const a = this.a;
    a.push(item);
    let i = a.length - 1;
    while (i > 0) {
      const p = (i - 1) >> 1;
      if (a[p].f <= a[i].f) break;
      [a[p], a[i]] = [a[i], a[p]];
      i = p;
    }
  }
  pop() {
    const a = this.a;
    const top = a[0], last = a.pop();
    if (a.length) {
      a[0] = last;
      let i = 0;
      for (;;) {
        const l = i * 2 + 1, r = l + 1;
        let m = i;
        if (l < a.length && a[l].f < a[m].f) m = l;
        if (r < a.length && a[r].f < a[m].f) m = r;
        if (m === i) break;
        [a[m], a[i]] = [a[i], a[m]];
        i = m;
      }
    }
    return top;
  }
  get size() { return this.a.length; }
}

function solve(start) {
  const startKey = start.join("");
  const goalKey = GOAL.join("");
  if (startKey === goalKey) return [];

  const open = new MinHeap();
  const gScore = new Map();     // 状態キー → g値
  const cameFrom = new Map();   // 状態キー → [親キー, 動かしたプレート番号]

  gScore.set(startKey, 0);
  open.push({ f: manhattan(start), g: 0, key: startKey });

  while (open.size) {
    const cur = open.pop();
    if (cur.key === goalKey) {
      const moves = [];
      let k = cur.key;
      while (k !== startKey) {
        const [pk, tile] = cameFrom.get(k);
        moves.push(tile);
        k = pk;
      }
      return moves.reverse();
    }
    if (cur.g > gScore.get(cur.key)) continue; // 古いエントリはスキップ

    const b = cur.key.split("").map(Number);
    const empty = b.indexOf(0);
    for (const ni of neighbors(empty)) {
      const nb = b.slice();
      nb[empty] = nb[ni];
      nb[ni] = 0;
      const nk = nb.join("");
      const ng = cur.g + 1;
      if (ng < (gScore.get(nk) ?? Infinity)) {
        gScore.set(nk, ng);
        cameFrom.set(nk, [cur.key, b[ni]]);
        open.push({ f: ng + manhattan(nb), g: ng, key: nk });
      }
    }
  }
  return null; // 到達不能（正規シャッフルでは発生しない）
}

/* =====================================================
   自動解答の再生
===================================================== */
const btnSolve   = document.getElementById("btnSolve");
const btnInstant = document.getElementById("btnInstant");
const btnStop    = document.getElementById("btnStop");
const speedEl    = document.getElementById("speed");

let solving = false;
let playTimer = null;

/* スライダー値(0〜100) → 1手あたりの間隔(ミリ秒) */
function stepInterval() {
  const v = Number(speedEl.value);
  return Math.round(700 - v * 6.3);   // 700ms（ゆっくり）〜 70ms（はやい）
}

function setSolvingUI(on) {
  solving = on;
  btnSolve.disabled   = on;
  btnInstant.disabled = on;
  btnShuffle.disabled = on;
  btnUndo.disabled    = on || history.length === 0;
  btnStop.hidden      = !on;
}

function stopAutoPlay() {
  if (playTimer !== null) {
    clearTimeout(playTimer);
    playTimer = null;
  }
  setSolvingUI(false);
}

function autoSolve() {
  if (isSolved()) {
    messageEl.textContent = "すでに完成しています";
    return;
  }
  const moves = solve(board);
  if (!moves) return;
  history = [];   // 自動解答後はアンドゥ対象なし
  messageEl.textContent = `最短 ${moves.length} 手で解答中…`;
  setSolvingUI(true);
  render();

  let i = 0;
  const step = () => {
    if (i >= moves.length) {
      stopAutoPlay();
      messageEl.textContent = `完成！（自動解答 ${moves.length} 手）`;
      shuffled = false;
      return;
    }
    tryMove(moves[i]);
    i++;
    render();
    playTimer = setTimeout(step, stepInterval()); // 再生中の速度変更も反映
  };
  step();
}

function instantSolve() {
  stopAutoPlay();
  if (isSolved()) {
    messageEl.textContent = "すでに完成しています";
    return;
  }
  board = GOAL.slice();
  shuffled = false;
  history = [];
  render();
  messageEl.textContent = "完成形にそろえました";
}

btnUndo.addEventListener("click", undo);
btnSolve.addEventListener("click", autoSolve);
btnInstant.addEventListener("click", instantSolve);
btnStop.addEventListener("click", () => {
  stopAutoPlay();
  messageEl.textContent = "自動解答を停止しました";
});

/* ---- 初期表示 ---- */
render();
</script>
</body>
</html>
